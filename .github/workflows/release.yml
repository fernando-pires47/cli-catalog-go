name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build linux amd64 binary
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/cs-linux-amd64 ./cmd/cs

      - name: Build linux arm64 binary
        run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/cs-linux-arm64 ./cmd/cs

      - name: Generate checksums
        run: sha256sum dist/cs-linux-amd64 dist/cs-linux-arm64 > dist/checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cs-linux-amd64
            dist/cs-linux-arm64
            dist/checksums.txt
